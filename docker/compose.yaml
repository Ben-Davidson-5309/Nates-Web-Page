version: "3.8"

services:
  react-app:
    build:
      context: ../509-junk-hauling
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../509-junk-hauling:/app
      - /app/node_modules # Ensure the container's node_modules are used
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm start  # Ensure React starts when the container is up

  server:
    build:
      context: ../server
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      - ../server:/server
      - /server/node_modules  # Ensure server's node_modules are handled similarly
    working_dir: /server
    command: npm run dev
    stdin_open: true
    tty: true
