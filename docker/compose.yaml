version: "3.8"
services:
  react-app:
    build:
      context: ../509-junk-hauling
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../509-junk-hauling:/app
      # anonymous volume for node_modules so host’s node_modules
      # (or lack thereof) doesn’t clobber the container install
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - FAST_REFRESH=false          # ← disable react-refresh
    stdin_open: true
    tty: true
    command: npm start

  server:
    build:
      context: ../server
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      - ../server:/server
      - /server/node_modules
    working_dir: /server
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    command: npm run dev
