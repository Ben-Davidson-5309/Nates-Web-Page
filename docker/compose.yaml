# Remove version line (obsolete in modern Docker)
services:
  react-app:
    build:
      context: ../509-junk-hauling
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../509-junk-hauling:/app
      - /app/node_modules  # ← CORRECTED to anonymous volume (remove colon and host path)
    environment:
      - FAST_REFRESH=false # Disable Fast Refresh
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
    command: npm start

  server:
    build:
      context: ../server
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      - ../server:/server
      - /server/node_modules  # ← CORRECTED to anonymous volume
    working_dir: /server
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    command: npm run dev
